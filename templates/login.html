<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
    font-family:Poppins;
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:40px;
    border-radius:15px;
    width:300px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    background:#667eea;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.error{
    color:red;
    margin:10px 0;
}
.success{
    color:green;
}
</style>
</head>

<body>

<div class="container">

<h2>Login</h2>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for msg in messages %}
      <div style="
        background-color:#d4edda;
        color:#155724;
        padding:10px;
        border-radius:5px;
        text-align:center;
        margin-bottom:10px;">
        {{ msg }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

<form method="POST">
    <input name="username" placeholder="Username" required>
    <input name="password" type="password" placeholder="Password" required>
    <button>Login</button>
</form>

<h3>Register</h3>
<form action="/register" method="POST">
    <input name="username" placeholder="New Username" required>
    <input name="password" type="password" placeholder="New Password" required>
    <button>Register</button>
</form>

</div>

</body>
</html>
